<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- fontawesome CDN -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- stylesheet  -->
    <link rel="stylesheet" href="style.css">
    <title>CRUD- REST-API</title>
</head>
<body>
   <header>
        <div class="container">
            <div class="row">
                <div class="col-12 py-3 d-flex justify-content-between align-items-center">
                    <h2 class="m-0 fw-bold text-white">PHP REST-API CRUD</h2>
                    <div class="col-3">
                        <input id="search" type="text" class="form-control" placeholder="Search...">
                    </div>
                </div>
            </div>
        </div>
   </header>
   <div class="formField bg-light py-3">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <form action="" class="d-flex justify-content-between align-items-center">
                        <div class="col-3 d-flex align-items-center">
                            <label for="" class="fs-5 me-2">Name:</label>
                            <input type="text" id="name" class="form-control">
                        </div>
                        <div class="col-3 d-flex align-items-center">
                            <label for="" class="fs-5 me-2">Age:</label>
                            <input type="text" id="age" class="form-control">
                        </div>
                        <div class="col-3 d-flex align-items-center">
                            <label for="" class="fs-5 me-2">City:</label>
                            <input type="text" id="city" class="form-control">
                        </div>
                        <button class="btn btn-success" id="submit">Submit</button>
                    </form>
                </div>
            </div>
        </div>
   </div>
   <div class="table-data mt-3">
        <div class="container"> 
            <div class="row">
                <div class="col-12 table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th style="background-color:#94B4C1;" scope="col">Sr.No</th>
                                <th style="background-color:#94B4C1;" scope="col">Name</th>
                                <th style="background-color:#94B4C1;" scope="col">Age</th>
                                <th style="background-color:#94B4C1;" scope="col">City</th>
                                <th style="background-color:#94B4C1;" class="text-center">Edit/Delete</th>
                            </tr>
                        </thead>
                        <tbody  id="tableData"></tbody>
                    </table>
                </div>
            </div>
        </div>
   </div>
   <div class="modalBox">
        <i class="fa-solid fa-xmark" style="position:absolute;top:20px;right:30px;color:#fff;cursor: pointer;font-size: 1.5rem;"></i>
        <div class="col-md-3 bg-white rounded-3 p-3">
            <h2 class="fw-bold">Edit Form</h2>
            <form action="">
                <div class="mb-3">
                    <input type="hidden" id="editId" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="">Name</label>
                    <input type="text" id="editname" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="">Age</label>
                    <input type="text" id="editage" class="form-control">
                </div>
                <div>
                    <label for="">City</label>
                    <input type="text" id="editcity" class="form-control">
                </div>
                <button class="btn btn-warning mt-2" id="editButton">Update</button>
            </form>
        </div>
   </div>
   <script src="js/jquery.js"></script>
   <script src="js/script.js"></script>
</body>
</html>
